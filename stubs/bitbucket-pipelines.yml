# Generated by sead/laravel-api-contract — php artisan api:contract:install --ci=bitbucket
# Re-run that command to regenerate this file.

image: php:8.3

pipelines:
  pull-requests:
    '**':
      - step:
          name: API Contract Tests
          caches:
            - composer
          script:
            - apt-get update && apt-get install -y unzip zip libzip-dev git
            - docker-php-ext-install pdo pdo_sqlite zip
            - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
            - composer install --no-interaction --prefer-dist --optimize-autoloader
            - cp .env.example .env
            - php artisan key:generate
            - php artisan test "{{TEST_PATH}}" {{TEST_FLAGS}}

definitions:
  caches:
    composer: ~/.composer/cache
